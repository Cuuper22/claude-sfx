name: Tests

on:
  push:
    branches: [ main, claude/add-sound-effects-YLE2y ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        cd claude-sfx
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        cd claude-sfx
        pytest -v --cov=sfx --cov-report=term-missing
    
    - name: Test CLI commands
      run: |
        cd claude-sfx
        claude-sfx --help
        claude-sfx generate
        claude-sfx status

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        cd claude-sfx
        python -m pip install --upgrade pip
        pip install mypy
    
    - name: Type check with mypy
      run: |
        cd claude-sfx
        mypy sfx --ignore-missing-imports || true
